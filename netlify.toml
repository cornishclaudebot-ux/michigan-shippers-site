# Netlify config for Michigan Shippers Supply.
# Static site at repo root + serverless functions (help-chat AI proxy + Shopify
# storefront proxy). Secrets live in the Netlify dashboard as environment
# variables (GEMINI_API_KEY, SHOPIFY_STOREFRONT_TOKEN) — never in the repo.

[build]
  publish = "."
  functions = "netlify/functions"

# Pretty path: the site calls /api/chat, which maps to the function.
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

# Shopify backend proxy (live catalog, checkout, customer accounts, orders).
# Inert until SHOPIFY_STOREFRONT_TOKEN is set in the Netlify dashboard.
[[redirects]]
  from = "/api/shop"
  to = "/.netlify/functions/shop"
  status = 200

# About page removed 2026-07-10 (merged into the homepage). Old links land on the
# contact/quote section so nothing 404s.
[[redirects]]
  from = "/about.html"
  to = "/#contact"
  status = 301

[[redirects]]
  from = "/about"
  to = "/#contact"
  status = 301
